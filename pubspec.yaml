name: ai_study_planner
description: "AI-powered study planner with spaced repetition, focus timer, and performance prediction."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # Dependency Injection
  get_it: ^8.0.3

  # Error Handling
  dartz: ^0.10.1

  # UUID
  uuid: ^4.5.3

  # Battery
  battery_plus: ^6.2.1

  # Typography
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  material_symbols_icons: ^4.2906.0
  lucide_icons: ^0.257.0
  intl: ^0.20.2
  wakelock_plus: ^1.4.0
  fl_chart: ^1.1.0
  flutter_heatmap_calendar: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
